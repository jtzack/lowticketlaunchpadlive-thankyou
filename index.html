<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're On The Waitlist | Low-Ticket Launchpad LIVE</title>
  <meta name="description" content="You're on the waitlist for Low-Ticket Launchpad LIVE. We'll be in touch when enrollment opens." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --tar:        #16120E;
      --espresso:   #3A322A;
      --line:       rgba(240, 228, 208, 0.08);
      --peach:      #FFB86C;
      --orange:     #E8682A;
      --linen:      #F0E4D0;
      --taupe:      #B4A690;
      --muted:      rgba(240, 228, 208, 0.6);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    ::selection { background: var(--orange); color: var(--linen); }

    body {
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 300;
      background-color: var(--tar);
      color: var(--linen);
      min-height: 100vh;
      padding: 48px 20px 80px;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      animation: fadeUp 0.6s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── Top Pill ─── */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--espresso);
      border: 1px solid var(--line);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--linen);
      margin-bottom: 28px;
    }

    .pill-dot {
      width: 8px; height: 8px;
      background: var(--peach);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ─── Headline ─── */
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 300;
      font-size: clamp(20px, 4.4vw, 34px);
      line-height: 1.1;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 12px;
      white-space: nowrap;
    }

    h1 .accent {
      color: var(--orange);
    }

    .subtitle {
      font-size: 18px;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .meantime {
      font-size: 17px;
      line-height: 1.6;
      color: var(--linen);
      margin-bottom: 28px;
      text-align: center;
      font-weight: 300;
    }

    .meantime strong {
      color: var(--orange);
      font-weight: 600;
    }

    /* ─── Cards ─── */
    .card {
      background: var(--espresso);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 28px 32px;
      margin-bottom: 20px;
    }

    .card-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--peach);
      margin-bottom: 10px;
    }

    .card h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 300;
      font-size: 22px;
      text-transform: uppercase;
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }

    .card p {
      font-size: 15px;
      line-height: 1.6;
      color: rgba(240, 228, 208, 0.75);
      font-weight: 300;
    }

    .card p + p { margin-top: 12px; }

    /* ─── CTA Card (highlighted) ─── */
    .cta-card {
      background: linear-gradient(135deg, rgba(232, 104, 42, 0.10), rgba(255, 184, 108, 0.04));
      border: 1px solid rgba(232, 104, 42, 0.30);
    }

    .cta-card .card-eyebrow { color: var(--orange); }

    .cta-time {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--orange);
      margin-top: 14px;
    }

    /* ─── Signature ─── */
    .signature {
      margin-top: 8px;
      margin-bottom: 32px;
      padding: 0 8px;
    }

    .signature p {
      font-size: 16px;
      line-height: 1.7;
      color: var(--muted);
    }

    .signature .names {
      color: var(--orange);
      font-weight: 500;
      margin-top: 4px;
    }

    /* ─── Launch Date Card ─── */
    .launch-card {
      text-align: center;
    }

    .launch-card .label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--peach);
      margin-bottom: 8px;
    }

    .launch-date {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 300;
      font-size: clamp(36px, 6vw, 48px);
      color: var(--orange);
      letter-spacing: -0.01em;
      margin-bottom: 18px;
    }

    /* ─── Activity Feed ─── */
    .activity-feed {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      text-align: left;
      height: 24px;
      overflow: hidden;
      position: relative;
    }

    .activity-list {
      list-style: none;
      padding: 0;
      margin: 0;
      animation: shuffle 18s infinite;
    }

    .activity-list li {
      height: 24px;
      font-size: 13px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .activity-list li::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--peach);
      border-radius: 50%;
      flex-shrink: 0;
    }

    @keyframes shuffle {
      0%,   14% { transform: translateY(0); }
      16%,  30% { transform: translateY(-24px); }
      32%,  46% { transform: translateY(-48px); }
      48%,  62% { transform: translateY(-72px); }
      64%,  78% { transform: translateY(-96px); }
      80%,  94% { transform: translateY(-120px); }
      96%, 100% { transform: translateY(0); }
    }

    /* ─── Survey Embed ─── */
    .survey-section {
      margin-top: 20px;
    }

    .survey-section h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 300;
      font-size: 22px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .survey-section .survey-sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .survey-embed {
      background: var(--espresso);
      border: 1px solid var(--line);
      border-radius: 16px;
      height: 560px;
      overflow: hidden;
    }

    .survey-embed iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ─── Footer ─── */
    footer {
      margin-top: 40px;
      text-align: center;
      font-size: 12px;
      color: rgba(240, 228, 208, 0.35);
    }

    @media (max-width: 640px) {
      body { padding: 32px 16px 64px; }
      .card { padding: 24px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Headline -->
    <h1>Hey! You're <span class="accent">officially on the waitlist</span> :)</h1>

    <!-- In the meantime copy -->
    <p class="meantime">Want a <strong>sneak peek</strong> of the program?</p>
    <p class="meantime">Answer <strong>3 quick questions</strong> and we'll give you free access to one of our Claude Skills!</p>

    <!-- Typeform survey -->
    <div class="survey-section">
      <div class="survey-embed">
        <iframe id="typeform-embed" title="Sneak Peek Form" allow="camera; microphone; autoplay; encrypted-media;"></iframe>
      </div>
    </div>

    <footer>&copy; 2026 Low-Ticket Launchpad. All rights reserved.</footer>
  </div>

  <script>
    // Pass email from URL param to Typeform
    var params = new URLSearchParams(window.location.search);
    var email = params.get('email') || '';
    // Replace with your actual Typeform ID when ready
    var typeformId = 'e2OLUI6U';
    var src = 'https://form.typeform.com/to/' + typeformId;
    if (email) src += '#email=' + encodeURIComponent(email);
    document.getElementById('typeform-embed').src = src;
  </script>
</body>
</html>
